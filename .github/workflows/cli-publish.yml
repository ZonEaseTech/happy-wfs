name: Publish CLI
run-name: "Publish CLI ${{ github.ref_name }}"

# Tag scheme:
#   cli-v<version> -> publish @zonease/happy to npm
# Docker images use docker-v<version>, and bare v* tags stay reserved for
# app/mobile releases. CLI uses cli-v* to avoid cross-triggering those lanes.
on:
  push:
    tags:
      - 'cli-v*'

permissions:
  contents: read
  id-token: write   # required for npm provenance

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: yarn
          cache-dependency-path: yarn.lock
          registry-url: https://registry.npmjs.org

      - name: Verify npm token
        run: npm whoami --registry https://registry.npmjs.org
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Install dependencies
        run: yarn install --frozen-lockfile

      - name: Assert git tag matches package version
        run: |
          set -euo pipefail
          tag_version="${GITHUB_REF_NAME#cli-v}"
          pkg_version="$(node -p "require('./packages/happy-cli/package.json').version")"
          if [[ "$tag_version" != "$pkg_version" ]]; then
            echo "git tag/package version mismatch — tag=$tag_version package=$pkg_version" >&2
            echo "Bump packages/happy-cli/package.json to $tag_version (or retag) before releasing." >&2
            exit 1
          fi
          echo "Publishing @zonease/happy@$pkg_version"

      - name: Build happy-wire
        run: yarn workspace happy-wire build

      - name: Build CLI
        run: yarn workspace @zonease/happy build

      - name: Run tests
        run: yarn workspace @zonease/happy test

      - name: Publish to npm
        working-directory: packages/happy-cli
        run: npm publish --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Summary
        run: |
          pkg_version="$(node -p "require('./packages/happy-cli/package.json').version")"
          echo "### ✅ Published" >> "$GITHUB_STEP_SUMMARY"
          echo "**@zonease/happy@${pkg_version}** is live on npm" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "[npm](https://www.npmjs.com/package/@zonease/happy/v/${pkg_version})" >> "$GITHUB_STEP_SUMMARY"
